name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update TOC version
        run: |
          sed -i "s/^## Version: .*/## Version: ${{ steps.version.outputs.version }}/" RaidInspector.toc

      - name: Commit version bump to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master
          git checkout "${{ steps.version.outputs.tag }}" -- RaidInspector.toc
          sed -i "s/^## Version: .*/## Version: ${{ steps.version.outputs.version }}/" RaidInspector.toc
          git add RaidInspector.toc
          git diff --cached --quiet || git commit -m "Update TOC version to ${{ steps.version.outputs.version }}"
          git push origin master

      - name: Build release zip
        run: |
          git checkout "${{ steps.version.outputs.tag }}"
          sed -i "s/^## Version: .*/## Version: ${{ steps.version.outputs.version }}/" RaidInspector.toc

          mkdir -p staging/RaidInspector
          cp *.lua staging/RaidInspector/
          cp *.toc staging/RaidInspector/
          cp README.md staging/RaidInspector/

          cd staging
          zip -r "../RaidInspector-${{ steps.version.outputs.version }}.zip" RaidInspector/

      - name: Create release and upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --title "${{ steps.version.outputs.tag }}" \
            "RaidInspector-${{ steps.version.outputs.version }}.zip"
